<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPS Tester</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
        #gameCanvas { display: block; width: 100%; height: 100%; }
        .loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #0f0; font-size: 18px; text-shadow: 0 0 10px #0f0; }
    </style>
</head>
<body>
    <div class="loading">Loading FPS Tester...</div>
    <canvas id="gameCanvas" width="1400" height="900"></canvas>
    <script src="fps_tester.js"></script>
    <script>
        window.addEventListener('load', () => {
            document.querySelector('.loading').style.display = 'none';
            const canvas = document.getElementById('gameCanvas');
            
            // Scale canvas to fit window
            const rect = canvas.getBoundingClientRect();
            const scaleX = window.innerWidth / 1400;
            const scaleY = window.innerHeight / 900;
            const scale = Math.min(scaleX, scaleY, 1);
            
            canvas.style.width = (1400 * scale) + 'px';
            canvas.style.height = (900 * scale) + 'px';
            
            const app = new FPSTesterApp('gameCanvas');
            app.run();
        });
    </script>
</body>
</html>
