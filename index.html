<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPS Tester</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 100%; height: 100%; background: #000; overflow: hidden; }
        #gameCanvas { display: block; margin: 0; padding: 0; }
        #status { position: fixed; top: 20px; left: 20px; color: #0f0; font-family: monospace; font-size: 16px; z-index: 1000; text-shadow: 0 0 10px #0f0; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="status">🔄 Initializing...</div>

    <script>
        // Setup canvas to fill window
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // Draw test pattern
        function drawTestPattern() {
            ctx.fillStyle = '#111111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#0f0';
            ctx.lineWidth = 2;
            ctx.strokeRect(50, 50, 200, 100);
            
            ctx.fillStyle = '#0f0';
            ctx.font = '20px monospace';
            ctx.fillText('Canvas Ready', 100, 100);
        }
        
        drawTestPattern();
        document.getElementById('status').textContent = '✓ Canvas initialized';
        
        setTimeout(() => {
            try {
                // Try to load FPSTesterApp
                if (typeof FPSTesterApp === 'undefined') {
                    document.getElementById('status').textContent = '⚠ FPSTesterApp not found - loading script...';
                    return;
                }
                
                document.getElementById('status').textContent = '✓ FPSTesterApp loaded, initializing...';
                
                // Create app with window size canvas
                const app = new FPSTesterApp('gameCanvas');
                
                document.getElementById('status').textContent = '✓ Starting app...';
                
                app.run().catch(e => {
                    document.getElementById('status').textContent = '✗ Error: ' + e.message;
                    console.error(e);
                });
                
                // Hide status bar after 2s if no error
                setTimeout(() => {
                    const status = document.getElementById('status');
                    if (status.textContent.startsWith('✓')) {
                        status.style.display = 'none';
                    }
                }, 2000);
                
            } catch (e) {
                document.getElementById('status').textContent = '✗ ' + e.message;
                console.error(e);
            }
        }, 500);
    </script>
    <script src="fps_tester.js"></script>
</body>
</html>
