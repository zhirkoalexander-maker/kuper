<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPS Tester</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 100%; height: 100%; background: #000; overflow: hidden; }
        #gameCanvas { display: block; margin: 0; padding: 0; }
        #status { position: fixed; top: 20px; left: 20px; color: #0f0; font-family: monospace; font-size: 16px; z-index: 1000; text-shadow: 0 0 10px #0f0; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="status">🔄 Loading fps_tester.js...</div>

    <script src="fps_tester.js" onload="initApp()" onerror="statusMsg('✗ Script failed to load')"></script>
    <script>
        // Setup canvas
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        function statusMsg(msg) {
            document.getElementById('status').textContent = msg;
            console.log(msg);
        }
        
        function drawTestPattern() {
            ctx.fillStyle = '#111111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#0f0';
            ctx.lineWidth = 2;
            ctx.strokeRect(50, 50, 200, 100);
            ctx.fillStyle = '#0f0';
            ctx.font = '20px monospace';
            ctx.fillText('Canvas Ready', 100, 100);
        }
        
        drawTestPattern();
        statusMsg('✓ Canvas initialized, loading script...');
        
        function initApp() {
            statusMsg('⏳ Initializing app...');
            
            setTimeout(() => {
                try {
                    if (typeof FPSTesterApp === 'undefined') {
                        statusMsg('✗ FPSTesterApp not found - script may not have loaded');
                        console.error('Available globals:', Object.keys(window).filter(k => k.includes('FPS') || k.includes('App')));
                        return;
                    }
                    
                    statusMsg('✓ FPSTesterApp found, starting...');
                    const app = new FPSTesterApp('gameCanvas');
                    
                    app.run().catch(e => {
                        statusMsg('✗ Runtime error: ' + e.message);
                        console.error(e);
                    });
                    
                    setTimeout(() => {
                        if (!document.getElementById('status').textContent.startsWith('✗')) {
                            document.getElementById('status').style.display = 'none';
                        }
                    }, 2000);
                    
                } catch (e) {
                    statusMsg('✗ Error: ' + e.message);
                    console.error(e);
                }
            }, 100);
        }
    </script>
</body>
</html>
