<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPS Tester</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: monospace; }
        #gameCanvas { display: block; background: #000; }
        #debug { position: fixed; top: 10px; left: 10px; color: #0f0; font-size: 14px; z-index: 2000; text-shadow: 0 0 5px #0f0; }
    </style>
</head>
<body>
    <div id="debug">Loading...</div>
    <canvas id="gameCanvas" width="1400" height="900"></canvas>
    <script>
        // Debug logging
        window.debugLog = function(msg) {
            const debug = document.getElementById('debug');
            const timestamp = new Date().toLocaleTimeString();
            if (debug) {
                debug.textContent = `[${timestamp}] ${msg}`;
                console.log(msg);
            }
        };
        
        window.debugLog('Script starting...');
    </script>
    <script src="fps_tester.js" onload="window.debugLog('fps_tester.js loaded')" onerror="window.debugLog('ERROR: fps_tester.js failed to load')"></script>
    <script>
        window.debugLog('Initialization script loaded');
        
        document.addEventListener('DOMContentLoaded', () => {
            window.debugLog('DOMContentLoaded fired');
            
            setTimeout(() => {
                try {
                    window.debugLog('Checking FPSTesterApp...');
                    
                    if (typeof FPSTesterApp === 'undefined') {
                        window.debugLog('ERROR: FPSTesterApp not defined');
                        return;
                    }
                    
                    window.debugLog('FPSTesterApp found, creating instance...');
                    
                    const canvas = document.getElementById('gameCanvas');
                    const ctx = canvas.getContext('2d');
                    
                    // Fill canvas with dark gray to verify context works
                    ctx.fillStyle = '#111111';
                    ctx.fillRect(0, 0, 1400, 900);
                    ctx.fillStyle = '#0f0';
                    ctx.font = '20px monospace';
                    ctx.fillText('Canvas working...', 50, 50);
                    
                    window.debugLog('Canvas verified, starting app...');
                    
                    const app = new FPSTesterApp('gameCanvas');
                    
                    window.debugLog('FPSTesterApp instance created, calling run()...');
                    
                    app.run();
                    
                    // Remove debug after 3 seconds if successful
                    setTimeout(() => {
                        const debug = document.getElementById('debug');
                        if (debug) debug.style.display = 'none';
                    }, 3000);
                    
                } catch (err) {
                    window.debugLog(`ERROR: ${err.message} at ${err.stack.split('\\n')[1]}`);
                }
            }, 200);
        });
    </script>
</body>
</html>
