<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPS Tester V2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 100%; height: 100%; background: #000; overflow: hidden; }
        #gameCanvas { display: block; margin: 0; padding: 0; }
        #status { position: fixed; top: 20px; left: 20px; color: #0f0; font-family: monospace; font-size: 16px; z-index: 1000; text-shadow: 0 0 10px #0f0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="status">Loading...</div>

    <script src="fps_tester_v2.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        
        function status(msg) {
            statusEl.textContent = msg;
            console.log(msg);
        }
        
        // Resize canvas
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        
        // Wait a bit for script to fully parse
        setTimeout(() => {
            status('Checking for FPSTesterApp...\n');
            status('typeof FPSTesterApp = ' + typeof window.FPSTesterApp + '\n');
            
            if (typeof FPSTesterApp === 'undefined') {
                status('✗ FPSTesterApp NOT found in window\n');
                status('Classes found in window:\n');
                const classes = Object.keys(window).filter(k => k.match(/^[A-Z]/)).slice(0, 20);
                status(classes.join('\n'));
                return;
            }
            
            status('✓ FPSTesterApp found!\n\nStarting app...\n');
            try {
                const app = new FPSTesterApp('gameCanvas');
                app.run();
                status(''); // Hide status on success
            } catch (e) {
                status('✗ Error: ' + e.message + '\n' + e.stack);
            }
        }, 200);
    </script>
</body>
</html>
