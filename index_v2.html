<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPS Tester</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 100%; height: 100%; background: #000; overflow: hidden; }
        #gameCanvas { display: block; margin: 0; padding: 0; }
        #status { position: fixed; top: 20px; left: 20px; color: #0f0; font-family: monospace; font-size: 16px; z-index: 1000; text-shadow: 0 0 10px #0f0; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="status">🔄 Loading fps_tester_v2.js...</div>

    <script src="fps_tester_v2.js" onload="window._scriptLoaded = true;" onerror="console.error('Script load error')"></script>
    <script>
        // Setup canvas
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        function statusMsg(msg) {
            document.getElementById('status').textContent = msg;
            console.log(msg);
        }
        
        function drawTestPattern() {
            ctx.fillStyle = '#111111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#0f0';
            ctx.lineWidth = 2;
            ctx.strokeRect(50, 50, 200, 100);
            ctx.fillStyle = '#0f0';
            ctx.font = '20px monospace';
            ctx.fillText('Canvas Ready', 100, 100);
        }
        
        drawTestPattern();
        statusMsg('✓ Canvas initialized, loading script...');
        
        function initApp() {
            statusMsg('⏳ Initializing app...');
            
            try {
                if (typeof FPSTesterApp === 'undefined') {
                    statusMsg('✗ FPSTesterApp not found in window');
                    return;
                }
                
                statusMsg('✓ FPSTesterApp found, creating instance...');
                const app = new FPSTesterApp('gameCanvas');
                
                statusMsg('✓ Running app...');
                app.run();
                
                setTimeout(() => {
                    if (!document.getElementById('status').textContent.startsWith('✗')) {
                        document.getElementById('status').style.display = 'none';
                    }
                }, 2000);
                
            } catch (e) {
                statusMsg('✗ ' + e.message);
                console.error('Init error:', e);
            }
        }
        
        // Wait for script to load
        let waitCount = 0;
        const checkScript = setInterval(() => {
            if (window._scriptLoaded || typeof FPSTesterApp !== 'undefined') {
                clearInterval(checkScript);
                initApp();
            } else if (++waitCount > 50) {
                clearInterval(checkScript);
                statusMsg('✗ Script load timeout');
            }
        }, 100);
    </script>
</body>
</html>
