<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPS Tester - Browser</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a1a;
            color: #fff;
            overflow: hidden;
        }
        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            background: #000;
        }
        #ui {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 5px;
            font-size: 14px;
            font-family: monospace;
            z-index: 10;
        }
        #fps { color: #0f0; font-weight: bold; }
        #test-name { margin-top: 10px; color: #aaa; }
        #menu {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            z-index: 20;
            border: 2px solid #0f0;
        }
        #menu h1 { margin-bottom: 20px; }
        #menu .category { margin: 15px 0; }
        #menu button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 8px 15px;
            margin: 5px;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
        }
        #menu button:hover { background: #0a0; }
        #menu button.active { background: #ff0; color: #000; }
        .hide { display: none !important; }
        #info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="ui">
        <div id="fps">FPS: 0</div>
        <div id="test-name">Menu</div>
    </div>
    
    <div id="menu">
        <h1>FPS Tester</h1>
        
        <div class="category">
            <div style="margin-bottom: 10px; color: #aaa;">GPU Tests</div>
            <button onclick="startTest('particles')">Particles</button>
            <button onclick="startTest('polygons')">Polygons</button>
            <button onclick="startTest('matrix')">Matrix Rain</button>
            <button onclick="startTest('fractal')">Fractal</button>
            <button onclick="startTest('bouncing')">Bouncing</button>
            <button onclick="startTest('plasma')">Plasma</button>
        </div>
        
        <div class="category">
            <div style="margin-bottom: 10px; color: #aaa;">System Tests</div>
            <button onclick="startTest('cpu')">CPU Test</button>
        </div>
        
        <div style="margin-top: 20px; color: #666; font-size: 11px;">
            Press ESC to return to menu
        </div>
    </div>
    
    <div id="info">
        Press buttons to start tests • ESC to exit
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const menu = document.getElementById('menu');
        const fpsDisplay = document.getElementById('fps');
        const testNameDisplay = document.getElementById('test-name');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        let currentTest = null;
        let running = false;
        let frameCount = 0;
        let fps = 0;
        let lastTime = Date.now();
        let testData = {};
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                stopTest();
            }
        });
        
        function startTest(test) {
            currentTest = test;
            running = true;
            menu.classList.add('hide');
            testNameDisplay.textContent = test.toUpperCase();
            testData = {};
            frameCount = 0;
        }
        
        function stopTest() {
            running = false;
            currentTest = null;
            menu.classList.remove('hide');
            testNameDisplay.textContent = 'Menu';
        }
        
        // Test implementations
        const tests = {
            particles() {
                if (!testData.particles) {
                    testData.particles = Array(500).fill().map(() => ({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        vx: (Math.random() - 0.5) * 8,
                        vy: (Math.random() - 0.5) * 8,
                        life: Math.random() * 255
                    }));
                }
                
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                testData.particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= 2;
                    
                    if (p.life < 0) {
                        p.x = Math.random() * canvas.width;
                        p.y = Math.random() * canvas.height;
                        p.life = 255;
                    }
                    
                    ctx.fillStyle = `rgba(0, 255, 0, ${p.life / 255})`;
                    ctx.fillRect(p.x, p.y, 2, 2);
                });
            },
            
            polygons() {
                if (!testData.rotation) testData.rotation = 0;
                
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                testData.rotation += 2;
                
                for (let i = 0; i < 20; i++) {
                    ctx.save();
                    ctx.translate(canvas.width / 2, canvas.height / 2);
                    ctx.rotate((testData.rotation + i * 18) * Math.PI / 180);
                    ctx.strokeStyle = `hsl(${(testData.rotation + i * 18) % 360}, 100%, 50%)`;
                    ctx.lineWidth = 2;
                    
                    ctx.beginPath();
                    for (let j = 0; j < 6; j++) {
                        const angle = (j * 60) * Math.PI / 180;
                        const x = Math.cos(angle) * (100 + i * 10);
                        const y = Math.sin(angle) * (100 + i * 10);
                        if (j === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.stroke();
                    ctx.restore();
                }
            },
            
            matrix() {
                if (!testData.matrix) {
                    testData.matrix = [];
                    for (let i = 0; i < 50; i++) {
                        testData.matrix.push({
                            x: Math.random() * canvas.width,
                            y: -20,
                            speed: Math.random() * 3 + 2,
                            chars: '01'.split('')
                        });
                    }
                }
                
                ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#0f0';
                ctx.font = '16px monospace';
                
                testData.matrix.forEach(drop => {
                    drop.y += drop.speed;
                    
                    if (drop.y > canvas.height) {
                        drop.y = -20;
                        drop.x = Math.random() * canvas.width;
                    }
                    
                    for (let i = 0; i < 10; i++) {
                        ctx.fillText(
                            drop.chars[Math.floor(Math.random() * 2)],
                            drop.x,
                            drop.y - i * 20
                        );
                    }
                });
            },
            
            fractal() {
                if (!testData.fractalLevel) testData.fractalLevel = 0;
                
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                testData.fractalLevel = (testData.fractalLevel + 0.5) % 360;
                
                ctx.strokeStyle = `hsl(${testData.fractalLevel}, 100%, 50%)`;
                ctx.lineWidth = 1;
                
                const drawTree = (x, y, angle, depth) => {
                    if (depth === 0) return;
                    
                    const endX = x + Math.cos(angle) * depth * 5;
                    const endY = y + Math.sin(angle) * depth * 5;
                    
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(endX, endY);
                    ctx.stroke();
                    
                    drawTree(endX, endY, angle - 0.5, depth - 1);
                    drawTree(endX, endY, angle + 0.5, depth - 1);
                };
                
                drawTree(canvas.width / 2, canvas.height, Math.PI / 2, 12);
            },
            
            bouncing() {
                if (!testData.balls) {
                    testData.balls = Array(30).fill().map(() => ({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        vx: (Math.random() - 0.5) * 6,
                        vy: (Math.random() - 0.5) * 6,
                        r: Math.random() * 10 + 5,
                        color: `hsl(${Math.random() * 360}, 100%, 50%)`
                    }));
                }
                
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                testData.balls.forEach(ball => {
                    ball.x += ball.vx;
                    ball.y += ball.vy;
                    
                    if (ball.x - ball.r < 0 || ball.x + ball.r > canvas.width) ball.vx *= -1;
                    if (ball.y - ball.r < 0 || ball.y + ball.r > canvas.height) ball.vy *= -1;
                    
                    ball.x = Math.max(ball.r, Math.min(canvas.width - ball.r, ball.x));
                    ball.y = Math.max(ball.r, Math.min(canvas.height - ball.r, ball.y));
                    
                    ctx.fillStyle = ball.color;
                    ctx.beginPath();
                    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
                    ctx.fill();
                });
            },
            
            plasma() {
                if (!testData.plasmaTime) testData.plasmaTime = 0;
                testData.plasmaTime++;
                
                const imageData = ctx.createImageData(canvas.width, canvas.height);
                const data = imageData.data;
                
                for (let i = 0; i < canvas.width; i++) {
                    for (let j = 0; j < canvas.height; j++) {
                        const idx = (j * canvas.width + i) * 4;
                        
                        const v1 = Math.sin((i + testData.plasmaTime) * 0.05) * 127 + 128;
                        const v2 = Math.sin((j + testData.plasmaTime) * 0.05) * 127 + 128;
                        const v3 = Math.sin((i + j + testData.plasmaTime) * 0.05) * 127 + 128;
                        
                        data[idx] = v1;
                        data[idx + 1] = v2;
                        data[idx + 2] = v3;
                        data[idx + 3] = 255;
                    }
                }
                
                ctx.putImageData(imageData, 0, 0);
            },
            
            cpu() {
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                if (!testData.cpuTime) testData.cpuTime = 0;
                testData.cpuTime++;
                
                ctx.fillStyle = '#0f0';
                ctx.font = '20px monospace';
                
                let sum = 0;
                for (let i = 0; i < 1000000; i++) {
                    sum += Math.sqrt(i) * Math.sin(i) * Math.cos(i);
                }
                
                ctx.fillText('CPU Stress Test Running...', 20, 40);
                ctx.fillText(`Iterations: ${testData.cpuTime * 1000000}`, 20, 80);
                ctx.fillText(`Result: ${(sum % 1000).toFixed(2)}`, 20, 120);
            }
        };
        
        function animate() {
            frameCount++;
            
            const now = Date.now();
            if (now - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = now;
            }
            
            fpsDisplay.textContent = `FPS: ${fps}`;
            
            if (running && tests[currentTest]) {
                tests[currentTest]();
            } else if (!running) {
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            
            requestAnimationFrame(animate);
        }
        
        animate();
    </script>
</body>
</html>
