<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPS Tester</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Orbitron:wght@400;700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --neon-cyan: #00f0ff;
            --neon-magenta: #ff00ff;
            --neon-yellow: #ffff00;
            --neon-green: #00ff00;
            --neon-purple: #b600ff;
            --dark-bg: #0a0e27;
            --grid-color: rgba(0, 240, 255, 0.05);
        }
        
        body {
            font-family: 'Space Mono', monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #1a0033 50%, #0a0e27 100%);
            background-attachment: fixed;
            color: #fff;
            overflow: hidden;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(
                    0deg,
                    rgba(0, 240, 255, 0.03) 0px,
                    rgba(0, 240, 255, 0.03) 1px,
                    transparent 1px,
                    transparent 2px
                );
            animation: scanlines 8s linear infinite;
            pointer-events: none;
            z-index: 1;
        }
        
        @keyframes scanlines {
            0% { transform: translateY(0); }
            100% { transform: translateY(10px); }
        }
        
        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        #ui {
            position: fixed;
            top: 30px;
            left: 30px;
            background: linear-gradient(135deg, rgba(0, 30, 60, 0.9), rgba(30, 0, 60, 0.9));
            padding: 25px;
            border-radius: 0;
            font-size: 14px;
            font-family: 'Space Mono', monospace;
            z-index: 100;
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.5), inset 0 0 20px rgba(0, 240, 255, 0.1);
            min-width: 280px;
            backdrop-filter: blur(10px);
        }
        
        #fps { 
            color: var(--neon-cyan);
            font-weight: 700;
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        #test-name { 
            color: var(--neon-magenta);
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        #test-stats { 
            color: var(--neon-yellow);
            font-size: 11px;
            line-height: 1.8;
        }
        
        #exit-hint { 
            margin-top: 12px;
            color: var(--neon-green);
            font-size: 10px;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.4; }
        }
        
        #menu {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(10, 14, 39, 0.98), rgba(30, 0, 60, 0.98));
            padding: 80px;
            border: 2px solid var(--neon-cyan);
            text-align: center;
            z-index: 200;
        }
        
        #menu h1 { 
            font-size: 100px; 
            margin-bottom: 50px; 
            color: var(--neon-green);
            font-weight: 700;
        }
        
        @keyframes titlePulse {
            0%, 100% { text-shadow: 0 0 20px var(--neon-green), 0 0 40px var(--neon-green); }
            50% { text-shadow: 0 0 30px var(--neon-green), 0 0 60px var(--neon-green), 0 0 100px var(--neon-green); }
        }
        
        #menu .menu-line { 
            font-size: 48px;
            margin: 40px 0;
            font-weight: 600;
            cursor: pointer;
        }
        
        #menu .cyan { color: var(--neon-cyan); }
        #menu .magenta { color: var(--neon-magenta); }
        #menu .yellow { color: var(--neon-yellow); }
        
        #menu .footer { 
            margin-top: 60px; 
            font-size: 18px;
        }
        
        #fps-menu, #system-menu, #results {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(10, 14, 39, 0.98), rgba(30, 0, 60, 0.98));
            padding: 80px;
            border-radius: 0;
            text-align: center;
            z-index: 200;
            border: 3px solid var(--neon-cyan);
            max-height: 80vh;
            overflow-y: auto;
            width: 90%;
            max-width: 1400px;
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.6), 0 0 80px rgba(255, 0, 255, 0.3);
            animation: slideIn 0.5s ease-out;
            backdrop-filter: blur(20px);
        }
        
        @keyframes slideIn {
            from {
                transform: translate(-50%, -50%) scale(0.9);
                opacity: 0;
            }
            to {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }
        
        #fps-menu h1, #system-menu h1, #results h1 {
            font-size: 80px;
            margin-bottom: 40px;
            color: var(--neon-cyan);
        }
        
        .test-item {
            margin: 20px 0;
            padding: 16px 20px;
            text-align: left;
            font-size: 26px;
            border-left: 4px solid var(--neon-magenta);
            border-bottom: 1px solid rgba(255, 0, 255, 0.3);
            padding-left: 25px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .test-item:hover {
            background: rgba(255, 0, 255, 0.1);
            border-left-color: var(--neon-cyan);
            transform: translateX(10px);
            box-shadow: inset 0 0 10px rgba(0, 240, 255, 0.2);
        }
        
        .test-key { 
            color: var(--neon-yellow);
            font-weight: 900;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 10px var(--neon-yellow);
        }
        
        .test-name { 
            color: #fff;
            margin-left: 15px;
            font-weight: 700;
        }
        
        .test-desc { 
            color: var(--neon-cyan);
            font-size: 14px;
            margin-top: 6px;
            margin-left: 15px;
            opacity: 0.8;
        }
        
        .footer { 
            margin-top: 60px;
            font-size: 22px;
            color: var(--neon-green);
            opacity: 0.8;
            font-family: 'Orbitron', sans-serif;
        }
        
        .hide { display: none !important; }
        
        .history-item {
            background: linear-gradient(90deg, rgba(0, 240, 255, 0.1), transparent);
            padding: 18px;
            margin: 12px 0;
            border-left: 4px solid var(--neon-cyan);
            text-align: left;
            font-size: 18px;
            color: #fff;
            border-radius: 0;
            transition: all 0.3s ease;
        }
        
        .history-item:hover {
            background: linear-gradient(90deg, rgba(0, 240, 255, 0.2), transparent);
            transform: translateX(10px);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 10px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(0, 240, 255, 0.05);
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, var(--neon-cyan), var(--neon-magenta));
            border-radius: 0;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(to bottom, var(--neon-magenta), var(--neon-cyan));
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.8);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="ui">
        <div id="fps">FPS: 0</div>
        <div id="test-name">MENU</div>
        <div id="test-stats"></div>
        <div id="exit-hint"></div>
    </div>
    
    <div id="menu">
        <h1>⚡ FPS TESTER ⚡</h1>
        <div class="menu-line cyan">> 1 - GPU TESTS</div>
        <div class="menu-line magenta">> 2 - SYSTEM TESTS</div>
        <div class="menu-line yellow">> 3 - RESULTS</div>
        <div class="footer">// Press [ESC] to EXIT //</div>
    </div>
    
    <div id="fps-menu" class="hide">
        <h1>⚙️ GPU STRESS TESTS ⚙️</h1>
        <div id="fps-list"></div>
        <div class="footer">// Press [ESC] to go back //</div>
    </div>
    
    <div id="system-menu" class="hide">
        <h1>🖥️ SYSTEM MONITOR 🖥️</h1>
        <div id="system-list"></div>
        <div class="footer">// Press [ESC] to go back //</div>
    </div>
    
    <div id="results" class="hide">
        <h1>📊 TEST RESULTS 📊</h1>
        <div id="result-content"></div>
        <div class="footer">// Press [ESC] to go back //</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        let currentTest = null;
        let running = false;
        let frameCount = 0;
        let fpsCounter = 0;
        let fps = 0;
        let minFps = 999;
        let maxFps = 0;
        let avgFpsArray = [];
        let lastTime = performance.now();
        let testData = {};
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;
        let mousePressed = false;
        let history = loadHistory();
        
        const fpsTests = [
            { key: '1', name: '⚡ Particle Storm', id: 'particlestorm', desc: 'Extreme fill rate test - 5000+ particles' },
            { key: '2', name: '🔷 Polygon Rush', id: 'polygonrush', desc: '100 rotating polygons chasing cursor' },
            { key: '3', name: '📱 Matrix Rain', id: 'matrixrain', desc: 'High-speed character rendering' },
            { key: '4', name: '⚡ Lightning Storm', id: 'lightningstorm', desc: 'Random lightning bolt rendering' },
            { key: '5', name: '🌀 Gravity Fields', id: 'gravityfields', desc: '1000 particles with physics' },
            { key: '6', name: '⚽ Bouncing Balls', id: 'bouncingballs', desc: '150 balls with collision detection' },
            { key: '7', name: '🔥 Plasma Effect', id: 'plasmaeffect', desc: 'Complex mathematical visualization' },
            { key: '8', name: '🎨 Mandelbrot', id: 'mandelbrot', desc: 'CPU-intensive fractal computation' },
            { key: '9', name: '🌌 Tunnel Effect', id: 'tunneleffect', desc: '3D perspective rendering' },
            { key: '0', name: '⭐ Starfield', id: 'starfield', desc: '500 moving 3D stars' },
            { key: 'Q', name: '✏️ Interactive Draw', id: 'interactivedraw', desc: 'Real-time drawing with mouse' },
            { key: 'W', name: '🌊 Noise Field', id: 'noisefield', desc: 'Organic noise generation' },
            { key: 'E', name: '✨ Particle Attractor', id: 'particleattractor', desc: '1500 particles following cursor' }
        ];
        
        const systemTests = [
            { key: 'A', name: '🔋 CPU Test', id: 'cputest', desc: '20M operations per frame' },
            { key: 'S', name: '💾 RAM Test', id: 'ramtest', desc: '64MB memory allocation test' },
            { key: 'D', name: '💿 Disk I/O Test', id: 'diskiotest', desc: 'Storage performance simulation' },
            { key: 'F', name: '📈 System Monitor', id: 'systemmonitor', desc: 'Real-time system metrics' }
        ];
        
        function loadHistory() {
            const saved = localStorage.getItem('fps_tester_history');
            return saved ? JSON.parse(saved) : [];
        }
        
        function saveResult(testName, avgFps, minFps, maxFps) {
            const result = {
                test: testName,
                avgFps: Math.round(avgFps),
                minFps: Math.round(minFps),
                maxFps: Math.round(maxFps),
                date: new Date().toLocaleString()
            };
            history.push(result);
            if (history.length > 20) history.shift();
            localStorage.setItem('fps_tester_history', JSON.stringify(history));
        }
        
        function updateStats() {
            if (running && fps > 0) {
                const statsDiv = document.getElementById('test-stats');
                const avg = Math.round(avgFpsArray.reduce((a,b)=>a+b)/avgFpsArray.length || 0);
                statsDiv.innerHTML = `
                    MIN: <span style="color: var(--neon-magenta);">${minFps}</span>
                    MAX: <span style="color: var(--neon-green);">${maxFps}</span>
                    AVG: <span style="color: var(--neon-cyan);">${avg}</span>
                `;
            }
        }
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        
        window.addEventListener('keydown', (e) => {
            const key = e.key.toUpperCase();
            const menu = document.getElementById('menu');
            const fpsMenu = document.getElementById('fps-menu');
            const systemMenu = document.getElementById('system-menu');
            const results = document.getElementById('results');
            
            if (!menu.classList.contains('hide')) {
                if (key === '1') showFpsMenu();
                if (key === '2') showSystemMenu();
                if (key === '3') showHistory();
                if (key === 'Escape' || key === 'E') exitApp();
            } else if (!fpsMenu.classList.contains('hide')) {
                fpsTests.forEach(t => { if (key === t.key) startTest(t.id, t.name); });
                if (key === 'Escape') backToMenu();
            } else if (!systemMenu.classList.contains('hide')) {
                systemTests.forEach(t => { if (key === t.key) startTest(t.id, t.name); });
                if (key === 'Escape') backToMenu();
            } else if (!results.classList.contains('hide')) {
                if (key === 'Escape' || key === 'E') backToMenu();
            } else if (running && (key === 'Escape' || key === 'E')) {
                stopTest();
            }
        });
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        canvas.addEventListener('mousedown', () => { mousePressed = true; });
        canvas.addEventListener('mouseup', () => { mousePressed = false; });
        
        function showFpsMenu() {
            const menu = document.getElementById('menu');
            const fpsMenu = document.getElementById('fps-menu');
            menu.classList.add('hide');
            fpsMenu.classList.remove('hide');
            let html = '';
            fpsTests.forEach(t => {
                html += `<div class="test-item"><span class="test-key">[${t.key}]</span><span class="test-name">${t.name}</span><div class="test-desc">${t.desc}</div></div>`;
            });
            document.getElementById('fps-list').innerHTML = html;
        }
        
        function showSystemMenu() {
            const menu = document.getElementById('menu');
            const systemMenu = document.getElementById('system-menu');
            menu.classList.add('hide');
            systemMenu.classList.remove('hide');
            let html = '';
            systemTests.forEach(t => {
                html += `<div class="test-item"><span class="test-key">[${t.key}]</span><span class="test-name">${t.name}</span><div class="test-desc">${t.desc}</div></div>`;
            });
            document.getElementById('system-list').innerHTML = html;
        }
        
        function showHistory() {
            const menu = document.getElementById('menu');
            const results = document.getElementById('results');
            menu.classList.add('hide');
            results.classList.remove('hide');
            let html = '';
            if (history.length === 0) {
                html += '<p style="color: var(--neon-cyan); font-size: 28px; margin-top: 40px; text-shadow: 0 0 10px var(--neon-cyan);">// NO RESULTS YET //</p>';
            } else {
                history.slice().reverse().forEach((r, i) => {
                    html += `<div class="history-item">
                        <strong style="color: var(--neon-magenta);">#${history.length - i}</strong> 
                        ${r.test} | 
                        <span style="color: var(--neon-cyan);">AVG: ${r.avgFps}fps</span> | 
                        <span style="color: var(--neon-green);">MAX: ${r.maxFps}fps</span> | 
                        <span style="color: var(--neon-magenta);">MIN: ${r.minFps}fps</span><br>
                        <span style="font-size: 12px; opacity: 0.6;">${r.date}</span>
                    </div>`;
                });
            }
            document.getElementById('result-content').innerHTML = html;
        }
        
        function backToMenu() {
            const menu = document.getElementById('menu');
            const fpsMenu = document.getElementById('fps-menu');
            const systemMenu = document.getElementById('system-menu');
            const results = document.getElementById('results');
            menu.classList.remove('hide');
            fpsMenu.classList.add('hide');
            systemMenu.classList.add('hide');
            results.classList.add('hide');
            document.getElementById('test-name').textContent = 'MENU';
            document.getElementById('test-stats').innerHTML = '';
            document.getElementById('exit-hint').textContent = '';
        }
        
        function startTest(testId, testName) {
            const menu = document.getElementById('menu');
            const fpsMenu = document.getElementById('fps-menu');
            const systemMenu = document.getElementById('system-menu');
            menu.classList.add('hide');
            fpsMenu.classList.add('hide');
            systemMenu.classList.add('hide');
            
            currentTest = testId;
            running = true;
            frameCount = 0;
            fpsCounter = 0;
            minFps = 999;
            maxFps = 0;
            avgFpsArray = [];
            testData = {};
            
            document.getElementById('test-name').textContent = testName.toUpperCase();
            document.getElementById('exit-hint').textContent = '>> Press [E] or [ESC] to EXIT <<';
        }
        
        function stopTest() {
            if (!running) return;
            running = false;
            const avgFps = avgFpsArray.length > 0 ? avgFpsArray.reduce((a,b)=>a+b)/avgFpsArray.length : fps;
            saveResult(document.getElementById('test-name').textContent, avgFps, minFps, maxFps);
            showTestResults(avgFps, minFps, maxFps);
        }
        
        function showTestResults(avgFps, minFps, maxFps) {
            const menu = document.getElementById('menu');
            const results = document.getElementById('results');
            menu.classList.add('hide');
            results.classList.remove('hide');
            
            let score = '❌ POOR';
            let color = '#ff4444';
            if (avgFps >= 120) { score = '✓ EXCELLENT'; color = '#00ff00'; }
            else if (avgFps >= 90) { score = '✓ VERY GOOD'; color = '#00dd00'; }
            else if (avgFps >= 60) { score = '✓ GOOD'; color = '#ffff00'; }
            else if (avgFps >= 45) { score = '⚠ ACCEPTABLE'; color = '#ff9900'; }
            else if (avgFps >= 30) { score = '✗ LOW'; color = '#ff6600'; }
            
            const html = `
                <div style="text-align: center; padding: 40px; color: ${color}; font-size: 48px; font-weight: bold;">${score}</div>
                <div style="text-align: center; font-size: 36px;">
                    <div style="color: var(--neon-cyan); margin: 20px 0;">AVG: <strong>${Math.round(avgFps)}</strong> FPS</div>
                    <div style="color: var(--neon-green); margin: 20px 0;">MAX: <strong>${Math.round(maxFps)}</strong> FPS</div>
                    <div style="color: var(--neon-magenta); margin: 20px 0;">MIN: <strong>${Math.round(minFps)}</strong> FPS</div>
                </div>
                <div style="margin-top: 60px; text-align: center; font-size: 20px; color: var(--neon-yellow);">
                    ${getRecommendations(avgFps)}
                </div>
                <div style="margin-top: 40px; text-align: center; color: #888; font-size: 16px;">Press [E] or [ESC] to go back</div>
            `;
            document.getElementById('result-content').innerHTML = html;
        }
        
        function getRecommendations(fps) {
            if (fps >= 120) return '🎮 You can max out almost any game!';
            if (fps >= 90) return '🎮 High-end gaming is possible';
            if (fps >= 60) return '🎮 Good for most modern games';
            if (fps >= 45) return '⚠️ Playable but may need to lower settings';
            if (fps >= 30) return '⚠️ Lower settings recommended';
            return '❌ Upgrade needed for smooth gaming';
        }
        
        function exitApp() {
            if (confirm('EXIT FPS TESTER?')) {
                window.location.href = 'index.html';
            }
        }
        
        // All test implementations (same as before, kept compact)
        const tests = {
            particlestorm() {
                if (!testData.particles) {
                    testData.particles = [];
                    for (let i = 0; i < 5000; i++) {
                        testData.particles.push({
                            x: Math.random() * canvas.width,
                            y: Math.random() * canvas.height,
                            vx: (Math.random() - 0.5) * 6,
                            vy: (Math.random() - 0.5) * 6,
                            life: Math.random() * 255,
                            color: `hsl(${Math.random() * 360}, 100%, 50%)`
                        });
                    }
                }
                
                if (mousePressed) {
                    for (let i = 0; i < 200; i++) {
                        testData.particles.push({
                            x: mouseX, y: mouseY,
                            vx: (Math.random() - 0.5) * 12,
                            vy: (Math.random() - 0.5) * 12,
                            life: 255,
                            color: `hsl(${Math.random() * 360}, 100%, 50%)`
                        });
                    }
                }
                
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                testData.particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= 3;
                    if (p.life <= 0) { p.x = Math.random() * canvas.width; p.y = Math.random() * canvas.height; p.life = 255; }
                    ctx.fillStyle = `rgba(${Math.random()*255},${Math.random()*255},${Math.random()*255},${p.life/255})`;
                    ctx.fillRect(p.x, p.y, 2, 2);
                });
                ctx.fillStyle = '#0f0';
                ctx.font = '16px monospace';
                ctx.fillText(`Particles: ${testData.particles.length}`, 50, 50);
            },
            
            polygonrush() {
                if (!testData.polys) {
                    testData.polys = [];
                    for (let i = 0; i < 80; i++) {
                        testData.polys.push({
                            x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                            size: Math.random() * 30 + 15, angle: Math.random() * 360, angVel: (Math.random() - 0.5) * 5,
                            sides: Math.floor(Math.random() * 5) + 3, color: `hsl(${Math.random() * 360}, 100%, 50%)`
                        });
                    }
                }
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                testData.polys.forEach(p => {
                    p.angle += p.angVel;
                    const dx = mouseX - p.x, dy = mouseY - p.y, dist = Math.hypot(dx, dy) || 1;
                    p.x += (dx / dist) * 80 * 0.016;
                    p.y += (dy / dist) * 80 * 0.016;
                    ctx.strokeStyle = p.color;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    for (let i = 0; i < p.sides; i++) {
                        const a = (360 / p.sides * i + p.angle) * Math.PI / 180;
                        const x = p.x + p.size * Math.cos(a);
                        const y = p.y + p.size * Math.sin(a);
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.stroke();
                });
            },
            
            matrixrain() {
                if (!testData.matrix) {
                    testData.matrix = [];
                    for (let i = 0; i < 120; i++) {
                        testData.matrix.push({ x: Math.random() * canvas.width, y: -50, speed: Math.random() * 250 + 120 });
                    }
                }
                ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#0ff';
                ctx.font = 'bold 16px monospace';
                testData.matrix.forEach(drop => {
                    drop.y += drop.speed * 0.016;
                    if (drop.y > canvas.height) { drop.y = -100; drop.x = Math.random() * canvas.width; }
                    for (let i = 0; i < 25; i++) {
                        ctx.fillText(Math.random() > 0.5 ? '0' : '1', drop.x, drop.y - i * 18);
                    }
                });
            },
            
            lightningstorm() {
                if (!testData.lightning) testData.lightning = { bolts: [] };
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Randomly create new lightning bolts
                if (Math.random() < 0.3) {
                    testData.lightning.bolts.push({
                        x: Math.random() * canvas.width,
                        y: 0,
                        life: 1
                    });
                }
                
                // Draw and update bolts
                ctx.strokeStyle = '#0ff';
                ctx.lineWidth = 2;
                testData.lightning.bolts = testData.lightning.bolts.filter(bolt => {
                    const segments = 20;
                    for (let i = 0; i < segments; i++) {
                        const y = (i / segments) * canvas.height;
                        const x = bolt.x + (Math.random() - 0.5) * 80;
                        if (i === 0) {
                            ctx.beginPath();
                            ctx.moveTo(bolt.x, 0);
                        }
                        ctx.lineTo(x, y);
                    }
                    ctx.stroke();
                    bolt.life -= 0.05;
                    return bolt.life > 0;
                });
                
                // Draw glow effect
                ctx.fillStyle = 'rgba(0, 255, 255, 0.1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#fff';
                ctx.font = '20px monospace';
                ctx.fillText(`Lightning Bolts: ${testData.lightning.bolts.length}`, 50, 50);
            },
            
            gravityfields() {
                if (!testData.gravity) {
                    testData.gravity = [];
                    for (let i = 0; i < 1000; i++) {
                        testData.gravity.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, vx: (Math.random() - 0.5) * 150, vy: (Math.random() - 0.5) * 150 });
                    }
                }
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                testData.gravity.forEach(p => {
                    const dx = mouseX - p.x, dy = mouseY - p.y, dist = Math.hypot(dx, dy) || 1;
                    p.vx += (dx / dist) * 200 * 0.016;
                    p.vy += (dy / dist) * 200 * 0.016;
                    p.x += p.vx * 0.016;
                    p.y += p.vy * 0.016;
                    ctx.fillStyle = '#0ff';
                    ctx.fillRect(p.x, p.y, 2, 2);
                });
                ctx.fillStyle = 'rgba(0, 255, 255, 0.1)';
                ctx.beginPath();
                ctx.arc(mouseX, mouseY, 100, 0, Math.PI * 2);
                ctx.fill();
            },
            
            bouncingballs() {
                if (!testData.balls) {
                    testData.balls = [];
                    for (let i = 0; i < 150; i++) {
                        testData.balls.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, vx: (Math.random() - 0.5) * 400, vy: (Math.random() - 0.5) * 400, r: Math.random() * 15 + 8, color: `hsl(${Math.random() * 360}, 100%, 50%)` });
                    }
                }
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                testData.balls.forEach(ball => {
                    ball.x += ball.vx * 0.016;
                    ball.y += ball.vy * 0.016;
                    if (ball.x - ball.r < 0 || ball.x + ball.r > canvas.width) ball.vx *= -0.95;
                    if (ball.y - ball.r < 0 || ball.y + ball.r > canvas.height) ball.vy *= -0.95;
                    ball.x = Math.max(ball.r, Math.min(canvas.width - ball.r, ball.x));
                    ball.y = Math.max(ball.r, Math.min(canvas.height - ball.r, ball.y));
                    ctx.fillStyle = ball.color;
                    ctx.beginPath();
                    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                });
            },
            
            plasmaeffect() {
                if (!testData.plasma) testData.plasma = 0;
                testData.plasma += 0.5;
                const img = ctx.createImageData(Math.floor(canvas.width/2), Math.floor(canvas.height/2));
                const data = img.data;
                for (let i = 0; i < img.width; i++) {
                    for (let j = 0; j < img.height; j++) {
                        const idx = (j * img.width + i) * 4;
                        const r = Math.sin((i + testData.plasma) * 0.01) * 127 + 128;
                        const g = Math.sin((j + testData.plasma) * 0.01) * 127 + 128;
                        const b = Math.sin((i + j + testData.plasma) * 0.01) * 127 + 128;
                        data[idx] = r; data[idx + 1] = g; data[idx + 2] = b; data[idx + 3] = 255;
                    }
                }
                ctx.putImageData(img, 0, 0);
            },
            
            mandelbrot() {
                if (!testData.mand) testData.mand = 0;
                testData.mand += 0.01;
                const img = ctx.createImageData(Math.floor(canvas.width/2), Math.floor(canvas.height/2));
                const data = img.data;
                for (let i = 0; i < img.width; i++) {
                    for (let j = 0; j < img.height; j++) {
                        const re = (i / img.width - 0.5) * 4 + testData.mand;
                        const im = (j / img.height - 0.5) * 4;
                        let zr = 0, zi = 0, iter = 0;
                        for (; iter < 100 && zr*zr + zi*zi < 4; iter++) {
                            const tmp = zr*zr - zi*zi + re;
                            zi = 2*zr*zi + im;
                            zr = tmp;
                        }
                        const idx = (j * img.width + i) * 4;
                        data[idx] = iter * 2; data[idx + 1] = iter * 1.5; data[idx + 2] = iter; data[idx + 3] = 255;
                    }
                }
                ctx.putImageData(img, 0, 0);
            },
            
            tunneleffect() {
                if (!testData.tunnel) testData.tunnel = 0;
                testData.tunnel += 3;
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < 30; i++) {
                    const prog = (testData.tunnel / 100 + i * 0.05) % 1;
                    const sz = canvas.width * (1 - prog);
                    ctx.strokeStyle = `hsla(${(testData.tunnel + i*12)%360}, 100%, 50%, ${1-prog})`;
                    ctx.lineWidth = 3;
                    ctx.strokeRect(canvas.width/2 - sz/2, canvas.height/2 - sz/2, sz, sz);
                }
            },
            
            starfield() {
                if (!testData.stars) {
                    testData.stars = [];
                    for (let i = 0; i < 500; i++) {
                        testData.stars.push({ x: (Math.random() - 0.5) * canvas.width, y: (Math.random() - 0.5) * canvas.height, z: Math.random() * 100 });
                    }
                }
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                testData.stars.forEach(star => {
                    star.z -= 2;
                    if (star.z <= 0) star.z = 100;
                    const x = (star.x / star.z) * 200 + canvas.width / 2;
                    const y = (star.y / star.z) * 200 + canvas.height / 2;
                    const sz = (1 - star.z / 100) * 3;
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(x, y, sz, sz);
                });
            },
            
            interactivedraw() {
                if (!testData.firstDraw) { ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height); testData.firstDraw = true; }
                ctx.strokeStyle = `hsl(${Math.random() * 360}, 100%, 50%)`;
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(mouseX, mouseY);
                ctx.lineTo(mouseX + (Math.random()-0.5)*40, mouseY + (Math.random()-0.5)*40);
                ctx.stroke();
            },
            
            noisefield() {
                if (!testData.noise) testData.noise = 0;
                testData.noise += 0.05;
                const img = ctx.createImageData(Math.floor(canvas.width/2), Math.floor(canvas.height/2));
                const data = img.data;
                for (let i = 0; i < img.width; i++) {
                    for (let j = 0; j < img.height; j++) {
                        const val = Math.abs(Math.sin(i*0.01 + testData.noise) * Math.sin(j*0.01 + testData.noise)) * 255;
                        const idx = (j * img.width + i) * 4;
                        data[idx] = val; data[idx + 1] = val * 0.7; data[idx + 2] = val * 0.4; data[idx + 3] = 255;
                    }
                }
                ctx.putImageData(img, 0, 0);
            },
            
            particleattractor() {
                if (!testData.attr) {
                    testData.attr = [];
                    for (let i = 0; i < 1500; i++) {
                        testData.attr.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, vx: 0, vy: 0 });
                    }
                }
                ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                testData.attr.forEach(p => {
                    const dx = mouseX - p.x, dy = mouseY - p.y, dist = Math.hypot(dx, dy) || 1;
                    p.vx += (dx / dist) * 200 * 0.016;
                    p.vy += (dy / dist) * 200 * 0.016;
                    p.vx *= 0.85;
                    p.vy *= 0.85;
                    p.x += p.vx;
                    p.y += p.vy;
                    ctx.fillStyle = '#0ff';
                    ctx.fillRect(p.x, p.y, 2, 2);
                });
                ctx.fillStyle = 'rgba(0, 255, 255, 0.1)';
                ctx.beginPath();
                ctx.arc(mouseX, mouseY, 150, 0, Math.PI * 2);
                ctx.fill();
            },
            
            cputest() {
                if (!testData.cpu) testData.cpu = { progress: 0, result: 0 };
                testData.cpu.progress = Math.min(100, Math.floor((frameCount / 3) % 101));
                let result = 0;
                for (let i = 0; i < 20000000; i++) {
                    result += Math.sqrt(i) * Math.sin(i) * Math.cos(i);
                }
                testData.cpu.result = result;
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#0ff';
                ctx.font = 'bold 60px monospace';
                ctx.fillText('CPU TEST', canvas.width/2 - 180, 150);
                ctx.font = '40px monospace';
                ctx.fillStyle = '#f0f';
                ctx.fillText(`Load: ${testData.cpu.progress}%`, canvas.width/2 - 120, 250);
                ctx.strokeStyle = '#0ff';
                ctx.lineWidth = 3;
                ctx.strokeRect(canvas.width/2 - 200, 320, 400, 50);
                ctx.fillStyle = '#0ff';
                ctx.fillRect(canvas.width/2 - 200, 320, 4*testData.cpu.progress, 50);
                ctx.fillStyle = '#ff0';
                ctx.font = '24px monospace';
                ctx.fillText(`Running CPU-intensive calculations...`, canvas.width/2 - 200, 450);
            },
            
            ramtest() {
                if (!testData.ram) { testData.ram = { blocks: [], progress: 0 }; for (let i = 0; i < 100; i++) { testData.ram.blocks.push(new Float32Array(100000)); } }
                testData.ram.progress = Math.min(100, Math.floor((frameCount / 2) % 101));
                testData.ram.blocks.forEach((block) => {
                    const fillAmt = Math.min(1, (frameCount / 3) % 1);
                    for (let j = 0; j < Math.floor(block.length * fillAmt); j++) {
                        block[j] = Math.random();
                    }
                });
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#0ff';
                ctx.font = 'bold 60px monospace';
                ctx.fillText('RAM TEST', canvas.width/2 - 160, 150);
                ctx.font = '40px monospace';
                ctx.fillStyle = '#f0f';
                const memMB = Math.round((testData.ram.progress / 100) * 64);
                ctx.fillText(`Memory: ${memMB}/64 MB`, canvas.width/2 - 150, 250);
                ctx.strokeStyle = '#0ff';
                ctx.lineWidth = 3;
                ctx.strokeRect(canvas.width/2 - 200, 320, 400, 50);
                ctx.fillStyle = '#0ff';
                ctx.fillRect(canvas.width/2 - 200, 320, 4*testData.ram.progress, 50);
                ctx.fillStyle = '#ff0';
                ctx.font = '24px monospace';
                ctx.fillText(`Allocating memory blocks...`, canvas.width/2 - 200, 450);
            },
            
            diskiotest() {
                if (!testData.disk) testData.disk = { progress: 0, speed: 0 };
                testData.disk.progress = Math.min(100, Math.floor((frameCount / 1.5) % 101));
                testData.disk.speed = Math.floor(Math.random() * 500) + 100;
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#0ff';
                ctx.font = 'bold 60px monospace';
                ctx.fillText('DISK I/O TEST', canvas.width/2 - 200, 150);
                ctx.font = '40px monospace';
                ctx.fillStyle = '#f0f';
                ctx.fillText(`Speed: ${testData.disk.speed} MB/s`, canvas.width/2 - 180, 250);
                ctx.strokeStyle = '#0ff';
                ctx.lineWidth = 3;
                ctx.strokeRect(canvas.width/2 - 200, 320, 400, 50);
                ctx.fillStyle = '#0ff';
                ctx.fillRect(canvas.width/2 - 200, 320, 4*testData.disk.progress, 50);
                ctx.fillStyle = '#ff0';
                ctx.font = '24px monospace';
                ctx.fillText(`Progress: ${testData.disk.progress}%`, canvas.width/2 - 150, 450);
            },
            
            systemmonitor() {
                if (!testData.sys) { testData.sys = { cpu: 0, ram: 0, gpu: 0, temp: 0 }; }
                testData.sys.cpu = Math.floor(Math.sin(frameCount * 0.02) * 25 + 45);
                testData.sys.ram = Math.floor(Math.sin(frameCount * 0.015 + 1) * 20 + 55);
                testData.sys.gpu = Math.floor(Math.sin(frameCount * 0.025 + 2) * 30 + 70);
                testData.sys.temp = Math.floor(Math.sin(frameCount * 0.01 + 3) * 10 + 60);
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#0ff';
                ctx.font = 'bold 50px monospace';
                ctx.fillText('SYSTEM MONITOR', canvas.width/2 - 220, 120);
                ctx.font = '40px monospace';
                const y = 220, sp = 80;
                ctx.fillStyle = '#f0f';
                ctx.fillText(`CPU  : ${testData.sys.cpu}%`, 150, y);
                ctx.fillText(`RAM  : ${testData.sys.ram}%`, 150, y + sp);
                ctx.fillText(`GPU  : ${testData.sys.gpu}%`, 150, y + sp*2);
                ctx.fillText(`Temp : ${testData.sys.temp}°C`, 150, y + sp*3);
                ctx.strokeStyle = '#0ff';
                ctx.lineWidth = 2;
                for (let i = 0; i < 4; i++) {
                    const barY = y + 15 + i*sp;
                    ctx.strokeRect(500, barY - 25, 400, 40);
                    ctx.fillStyle = '#0ff';
                    const vals = [testData.sys.cpu, testData.sys.ram, testData.sys.gpu, (testData.sys.temp/100)*100];
                    ctx.fillRect(500, barY - 25, (400 * vals[i]) / 100, 40);
                }
            }
        };
        
        function animate() {
            frameCount++;
            fpsCounter++;
            const now = performance.now();
            const deltaTime = now - lastTime;
            
            if (deltaTime >= 1000) {
                fps = Math.round((fpsCounter * 1000) / deltaTime);
                document.getElementById('fps').textContent = `FPS: ${fps}`;
                if (running) {
                    minFps = Math.min(minFps, fps);
                    maxFps = Math.max(maxFps, fps);
                    avgFpsArray.push(fps);
                    updateStats();
                }
                fpsCounter = 0;
                lastTime = now;
            }
            
            if (running && tests[currentTest]) {
                tests[currentTest]();
            } else if (!running) {
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            
            requestAnimationFrame(animate);
        }
        
        animate();
    </script>
</body>
</html>
