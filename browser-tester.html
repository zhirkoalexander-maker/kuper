<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPS Tester</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #fff;
            overflow: hidden;
        }
        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #ui {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.95);
            padding: 15px;
            border-radius: 0;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            z-index: 10;
            border: 1px solid #0ff;
        }
        #fps { color: #0ff; font-weight: bold; font-size: 20px; }
        #test-name { margin-top: 8px; color: #f0f; font-size: 13px; }
        #exit-hint { margin-top: 12px; color: #ff0; font-size: 12px; font-weight: bold; }
        #menu {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #000;
            padding: 80px;
            border-radius: 0;
            text-align: center;
            z-index: 20;
            border: 2px solid #0ff;
            max-height: 90vh;
            overflow-y: auto;
        }
        #menu h1 { 
            font-size: 100px; 
            margin-bottom: 80px; 
            color: #0f0; 
            font-weight: bold;
            letter-spacing: 4px;
        }
        #menu .menu-line { 
            font-size: 50px;
            margin: 60px 0;
            font-weight: bold;
            letter-spacing: 2px;
        }
        #menu .cyan { color: #0ff; }
        #menu .magenta { color: #f0f; }
        #menu .yellow { color: #ff0; }
        #menu .white { color: #fff; }
        #menu .footer { 
            margin-top: 100px; 
            font-size: 24px; 
            color: #fff;
        }
        
        .hide { display: none !important; }
        
        #fps-menu, #system-menu {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #000;
            padding: 60px;
            border-radius: 0;
            text-align: center;
            z-index: 20;
            border: 2px solid #0ff;
            max-height: 85vh;
            overflow-y: auto;
            width: 90%;
            max-width: 1200px;
        }
        #fps-menu h1, #system-menu h1 {
            font-size: 80px;
            margin-bottom: 40px;
            color: #0ff;
            font-weight: bold;
            letter-spacing: 3px;
        }
        #fps-menu .test-item, #system-menu .test-item {
            margin: 30px 0;
            padding: 15px;
            text-align: left;
            font-size: 28px;
            color: #fff;
            font-weight: bold;
        }
        #fps-menu .test-key, #system-menu .test-key {
            color: #0f0;
            font-weight: bold;
            display: inline-block;
            width: 80px;
        }
        #fps-menu .test-name, #system-menu .test-name {
            color: #0ff;
            font-weight: bold;
            display: inline-block;
            min-width: 300px;
        }
        #fps-menu .test-desc, #system-menu .test-desc {
            color: #fff;
            font-size: 20px;
            display: block;
            margin-left: 80px;
            margin-top: 8px;
        }
        #fps-menu .footer, #system-menu .footer { 
            margin-top: 40px; 
            font-size: 20px; 
            color: #fff;
        }
        
        #results {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #000;
            padding: 80px;
            border-radius: 0;
            text-align: center;
            z-index: 20;
            border: 2px solid #444;
            max-height: 90vh;
            overflow-y: auto;
            max-width: 1200px;
            width: 90%;
        }
        #results h1 { color: #0f0; font-size: 80px; margin-bottom: 40px; font-weight: bold; }
        #results h2 { color: #0ff; font-size: 40px; margin: 40px 0 20px 0; font-weight: bold; }
        #results .score { font-size: 60px; color: #0f0; font-weight: bold; margin: 30px 0; }
        #results .games { margin: 40px 0; text-align: center; }
        #results .game-tier { margin: 30px 0; }
        #results .game-tier h3 { color: #0ff; font-size: 28px; margin-bottom: 15px; }
        #results .game-tier p { color: #fff; font-size: 24px; margin: 10px 0; }
        #results button { 
            background: transparent;
            color: #0f0;
            border: none;
            padding: 15px 30px;
            border-radius: 0;
            cursor: pointer;
            font-weight: bold;
            font-size: 28px;
            font-family: 'Courier New', monospace;
            margin-top: 30px;
        }
        #results button:hover { color: #fff; background: rgba(0, 255, 0, 0.2); }
        
        .history-item {
            background: transparent;
            padding: 15px;
            margin: 10px 0;
            border-left: 3px solid #0f0;
            text-align: left;
            font-size: 22px;
            color: #fff;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="ui">
        <div id="fps">FPS: 0</div>
        <div id="test-name">Menu</div>
        <div id="exit-hint"></div>
    </div>
    
    <!-- Main Menu -->
    <div id="menu">
        <h1>FPS TESTER</h1>
        <div class="menu-line cyan">1 - FPS Tests</div>
        <div class="menu-line magenta">2 - System Tests</div>
        <div class="menu-line yellow">3 - Results</div>
        <div class="footer">Press ESC to exit</div>
    </div>
    
    <!-- FPS Menu -->
    <div id="fps-menu" class="hide">
        <h1>FPS TESTS</h1>
        <div id="fps-list"></div>
        <div class="footer">Press ESC to go back</div>
    </div>
    
    <!-- System Menu -->
    <div id="system-menu" class="hide">
        <h1>SYSTEM TESTS</h1>
        <div id="system-list"></div>
        <div class="footer">Press ESC to go back</div>
    </div>
    
    <!-- Results -->
    <div id="results" class="hide">
        <h1>RESULTS</h1>
        <div id="result-content"></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const menu = document.getElementById('menu');
        const fpsMenu = document.getElementById('fps-menu');
        const systemMenu = document.getElementById('system-menu');
        const results = document.getElementById('results');
        const fpsDisplay = document.getElementById('fps');
        const testNameDisplay = document.getElementById('test-name');
        const exitHintDisplay = document.getElementById('exit-hint');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        let currentTest = null;
        let running = false;
        let frameCount = 0;
        let fpsCounter = 0;
        let fps = 0;
        let lastTime = performance.now();
        let testData = {};
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;
        let testStartTime = 0;
        let testDuration = 0;
        let avgFpsArray = [];
        
        let history = loadHistory();
        
        const fpsTests = [
            { key: '1', name: 'Particle Storm', id: 'particlestorm', desc: 'Particles and explosions' },
            { key: '2', name: 'Polygon Rush', id: 'polygonrush', desc: 'Rotating polygons' },
            { key: '3', name: 'Matrix Rain', id: 'matrixrain', desc: 'Falling characters' },
            { key: '4', name: 'Fractal Tree', id: 'fractaltree', desc: 'Recursive trees' },
            { key: '5', name: 'Gravity Fields', id: 'gravityfields', desc: 'Particles in gravity' },
            { key: '6', name: 'Bouncing Balls', id: 'bouncingballs', desc: 'Bouncing balls' },
            { key: '7', name: 'Plasma Effect', id: 'plasmaeffect', desc: 'Plasma effect' },
            { key: '8', name: 'Mandelbrot', id: 'mandelbrot', desc: 'Mandelbrot set' },
            { key: '9', name: 'Tunnel Effect', id: 'tunneleffect', desc: '3D tunnel' },
            { key: '0', name: 'Starfield', id: 'starfield', desc: 'Starfield' },
            { key: 'Q', name: 'Interactive Draw', id: 'interactivedraw', desc: 'Draw with mouse' },
            { key: 'W', name: 'Noise Field', id: 'noisefield', desc: 'Noise field' },
            { key: 'E', name: 'Particle Attractor', id: 'particleattractor', desc: 'Particles to cursor' }
        ];
        
        const systemTests = [
            { key: 'A', name: 'CPU Test', id: 'cputest', desc: 'Processor test' },
            { key: 'S', name: 'RAM Test', id: 'ramtest', desc: 'Memory test' },
            { key: 'D', name: 'Disk I/O Test', id: 'diskiotest', desc: 'Disk test' },
            { key: 'F', name: 'System Monitor', id: 'systemmonitor', desc: 'System monitor' }
        ];
        
        function loadHistory() {
            const saved = localStorage.getItem('fps_tester_history');
            return saved ? JSON.parse(saved) : [];
        }
        
        function saveResult(testName, avgFps) {
            const result = {
                test: testName,
                fps: Math.round(avgFps),
                date: new Date().toLocaleString()
            };
            history.push(result);
            if (history.length > 10) history.shift();
            localStorage.setItem('fps_tester_history', JSON.stringify(history));
        }
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        
        window.addEventListener('keydown', (e) => {
            const key = e.key.toUpperCase();
            
            // Main menu
            if (menu.classList.contains('hide') === false) {
                if (key === '1') showFpsMenu();
                if (key === '2') showSystemMenu();
                if (key === '3') showHistory();
                if (key === 'Escape') exitApp();
            }
            
            // FPS menu
            if (fpsMenu.classList.contains('hide') === false) {
                fpsTests.forEach(test => {
                    if (key === test.key) startTest(test.id, test.name);
                });
                if (key === 'Escape') {
                    fpsMenu.classList.add('hide');
                    menu.classList.remove('hide');
                    exitHintDisplay.textContent = '';
                }
            }
            
            // System menu
            if (systemMenu.classList.contains('hide') === false) {
                systemTests.forEach(test => {
                    if (key === test.key) startTest(test.id, test.name);
                });
                if (key === 'Escape') {
                    systemMenu.classList.add('hide');
                    menu.classList.remove('hide');
                    exitHintDisplay.textContent = '';
                }
            }
            
            // During test
            if (running && key === 'Escape') stopTest();
        });
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        function showFpsMenu() {
            fpsMenu.classList.remove('hide');
            menu.classList.add('hide');
            systemMenu.classList.add('hide');
            results.classList.add('hide');
            
            let html = '';
            fpsTests.forEach(test => {
                html += `<div class="test-item"><span class="test-key">${test.key}</span> <span class="test-name">${test.name}</span><div class="test-desc">${test.desc}</div></div>`;
            });
            document.getElementById('fps-list').innerHTML = html;
        }
        
        function showSystemMenu() {
            systemMenu.classList.remove('hide');
            menu.classList.add('hide');
            fpsMenu.classList.add('hide');
            results.classList.add('hide');
            
            let html = '';
            systemTests.forEach(test => {
                html += `<div class="test-item"><span class="test-key">${test.key}</span> <span class="test-name">${test.name}</span><div class="test-desc">${test.desc}</div></div>`;
            });
            document.getElementById('system-list').innerHTML = html;
        }
        
        function showHistory() {
            results.classList.remove('hide');
            menu.classList.add('hide');
            fpsMenu.classList.add('hide');
            systemMenu.classList.add('hide');
            
            let html = '<h2>RESULTS</h2>';
            if (history.length === 0) {
                html += '<p style="color: #888; font-size: 24px; margin-top: 30px;">No results yet</p>';
            } else {
                history.slice().reverse().forEach(r => {
                    html += `<div class="history-item">${r.test} - ${r.fps} FPS - ${r.date}</div>`;
                });
            }
            html += '<button onclick="backToMenu()">← Back</button>';
            document.getElementById('result-content').innerHTML = html;
        }
        
        function startTest(testId, testName) {
            currentTest = testId;
            running = true;
            testStartTime = performance.now();
            testDuration = 0;
            avgFpsArray = [];
            menu.classList.add('hide');
            fpsMenu.classList.add('hide');
            systemMenu.classList.add('hide');
            results.classList.add('hide');
            testNameDisplay.textContent = testName.toUpperCase();
            exitHintDisplay.textContent = 'Press ESC to EXIT';
            testData = {};
            frameCount = 0;
            fpsCounter = 0;
        }
        
        function stopTest() {
            if (running && frameCount > 30) {
                const elapsed = (performance.now() - testStartTime) / 1000;
                const avgFps = avgFpsArray.length > 0 
                    ? Math.round(avgFpsArray.reduce((a, b) => a + b) / avgFpsArray.length)
                    : fps;
                saveResult(testNameDisplay.textContent, avgFps);
                running = false;
                currentTest = null;
                menu.classList.remove('hide');
                testNameDisplay.textContent = 'Menu';
                exitHintDisplay.textContent = '';
            }
        }
        
        function exitApp() {
            if (confirm('Exit FPS Tester?')) {
                window.location.href = 'index.html';
            }
        }
        
        function backToMenu() {
            results.classList.add('hide');
            menu.classList.remove('hide');
            testNameDisplay.textContent = 'Menu';
        }
        
        // Test implementations
        const tests = {
            particlestorm() {
                if (!testData.particles) {
                    testData.particles = Array(800).fill().map(() => ({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        vx: (Math.random() - 0.5) * 8,
                        vy: (Math.random() - 0.5) * 8,
                        life: Math.random() * 255
                    }));
                }
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                testData.particles.forEach(p => {
                    p.x += p.vx; p.y += p.vy; p.life -= 2;
                    if (p.life < 0) { p.x = Math.random() * canvas.width; p.y = Math.random() * canvas.height; p.life = 255; }
                    ctx.fillStyle = `rgba(0, 255, 0, ${p.life / 255})`;
                    ctx.fillRect(p.x, p.y, 3, 3);
                });
            },
            polygonrush() {
                if (!testData.rotation) testData.rotation = 0;
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                testData.rotation += 3;
                for (let i = 0; i < 25; i++) {
                    ctx.save();
                    ctx.translate(canvas.width / 2, canvas.height / 2);
                    ctx.rotate((testData.rotation + i * 15) * Math.PI / 180);
                    ctx.strokeStyle = `hsl(${(testData.rotation + i * 15) % 360}, 100%, 50%)`;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    for (let j = 0; j < 8; j++) {
                        const angle = (j * 45) * Math.PI / 180;
                        const x = Math.cos(angle) * (100 + i * 12);
                        const y = Math.sin(angle) * (100 + i * 12);
                        if (j === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.stroke();
                    ctx.restore();
                }
            },
            matrixrain() {
                if (!testData.matrix) {
                    testData.matrix = [];
                    for (let i = 0; i < 80; i++) {
                        testData.matrix.push({x: Math.random() * canvas.width, y: -20, speed: Math.random() * 4 + 2});
                    }
                }
                ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#0f0';
                ctx.font = 'bold 18px monospace';
                testData.matrix.forEach(drop => {
                    drop.y += drop.speed;
                    if (drop.y > canvas.height) { drop.y = -20; drop.x = Math.random() * canvas.width; }
                    for (let i = 0; i < 15; i++) {
                        ctx.fillText(Math.random() > 0.5 ? '0' : '1', drop.x, drop.y - i * 20);
                    }
                });
            },
            fractaltree() {
                if (!testData.fractalLevel) testData.fractalLevel = 0;
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                testData.fractalLevel = (testData.fractalLevel + 1) % 360;
                ctx.strokeStyle = `hsl(${testData.fractalLevel}, 100%, 50%)`;
                ctx.lineWidth = 2;
                const drawTree = (x, y, angle, depth) => {
                    if (depth === 0) return;
                    const endX = x + Math.cos(angle) * depth * 6;
                    const endY = y + Math.sin(angle) * depth * 6;
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(endX, endY);
                    ctx.stroke();
                    drawTree(endX, endY, angle - 0.4, depth - 1);
                    drawTree(endX, endY, angle + 0.4, depth - 1);
                };
                drawTree(canvas.width / 2, canvas.height * 0.9, Math.PI / 2, 14);
            },
            gravityfields() {
                if (!testData.gravity) {
                    testData.gravity = Array(300).fill().map(() => ({x: Math.random() * canvas.width, y: Math.random() * canvas.height, vx: (Math.random() - 0.5) * 3, vy: (Math.random() - 0.5) * 3}));
                    testData.gravCenter = { x: canvas.width / 2, y: canvas.height / 2 };
                }
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#0f0';
                testData.gravity.forEach(p => {
                    const dx = testData.gravCenter.x - p.x;
                    const dy = testData.gravCenter.y - p.y;
                    const dist = Math.sqrt(dx * dx + dy * dy) + 1;
                    p.vx += (dx / dist) * 0.15;
                    p.vy += (dy / dist) * 0.15;
                    p.x += p.vx;
                    p.y += p.vy;
                    ctx.fillRect(p.x, p.y, 2, 2);
                });
                ctx.fillStyle = 'rgba(0, 255, 0, 0.3)';
                ctx.beginPath();
                ctx.arc(testData.gravCenter.x, testData.gravCenter.y, 50, 0, Math.PI * 2);
                ctx.fill();
            },
            bouncingballs() {
                if (!testData.balls) {
                    testData.balls = Array(40).fill().map(() => ({x: Math.random() * canvas.width, y: Math.random() * canvas.height, vx: (Math.random() - 0.5) * 7, vy: (Math.random() - 0.5) * 7, r: Math.random() * 12 + 6, color: `hsl(${Math.random() * 360}, 100%, 50%)`}));
                }
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                testData.balls.forEach(ball => {
                    ball.x += ball.vx; ball.y += ball.vy;
                    if (ball.x - ball.r < 0 || ball.x + ball.r > canvas.width) ball.vx *= -0.98;
                    if (ball.y - ball.r < 0 || ball.y + ball.r > canvas.height) ball.vy *= -0.98;
                    ball.x = Math.max(ball.r, Math.min(canvas.width - ball.r, ball.x));
                    ball.y = Math.max(ball.r, Math.min(canvas.height - ball.r, ball.y));
                    ctx.fillStyle = ball.color;
                    ctx.beginPath();
                    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                });
            },
            plasmaeffect() {
                if (!testData.plasmaTime) testData.plasmaTime = 0;
                testData.plasmaTime++;
                const imageData = ctx.createImageData(canvas.width, canvas.height);
                const data = imageData.data;
                for (let i = 0; i < canvas.width; i += 2) {
                    for (let j = 0; j < canvas.height; j += 2) {
                        const idx = (j * canvas.width + i) * 4;
                        const v1 = Math.sin((i + testData.plasmaTime) * 0.02) * 127 + 128;
                        const v2 = Math.sin((j + testData.plasmaTime) * 0.02) * 127 + 128;
                        const v3 = Math.sin((i + j + testData.plasmaTime) * 0.02) * 127 + 128;
                        data[idx] = v1; data[idx + 1] = v2; data[idx + 2] = v3; data[idx + 3] = 255;
                    }
                }
                ctx.putImageData(imageData, 0, 0);
            },
            mandelbrot() {
                if (!testData.mandTime) testData.mandTime = 0;
                testData.mandTime += 0.005;
                const imageData = ctx.createImageData(canvas.width, canvas.height);
                const data = imageData.data;
                for (let i = 0; i < canvas.width; i += 2) {
                    for (let j = 0; j < canvas.height; j += 2) {
                        const re = (i / canvas.width - 0.5) * 4 + testData.mandTime;
                        const im = (j / canvas.height - 0.5) * 4;
                        let zr = 0, zi = 0, iter = 0;
                        for (; iter < 100 && zr * zr + zi * zi < 4; iter++) {
                            const tmp = zr * zr - zi * zi + re;
                            zi = 2 * zr * zi + im;
                            zr = tmp;
                        }
                        const idx = (j * canvas.width + i) * 4;
                        data[idx] = iter * 2; data[idx + 1] = iter * 1.5; data[idx + 2] = iter; data[idx + 3] = 255;
                    }
                }
                ctx.putImageData(imageData, 0, 0);
            },
            tunneleffect() {
                if (!testData.tunnelTime) testData.tunnelTime = 0;
                testData.tunnelTime += 3;
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < 30; i++) {
                    const progress = (testData.tunnelTime / 100 + i * 0.05) % 1;
                    const size = canvas.width * (1 - progress);
                    const alpha = 1 - progress;
                    ctx.strokeStyle = `hsla(${(testData.tunnelTime + i * 12) % 360}, 100%, 50%, ${alpha})`;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.rect(canvas.width / 2 - size / 2, canvas.height / 2 - size / 2, size, size);
                    ctx.stroke();
                }
            },
            starfield() {
                if (!testData.stars) {
                    testData.stars = Array(300).fill().map(() => ({x: Math.random() * canvas.width - canvas.width / 2, y: Math.random() * canvas.height - canvas.height / 2, z: Math.random() * 100}));
                }
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                testData.stars.forEach(star => {
                    star.z -= 1.5;
                    if (star.z <= 0) star.z = 100;
                    const x = (star.x / star.z) * 150 + canvas.width / 2;
                    const y = (star.y / star.z) * 150 + canvas.height / 2;
                    const size = (1 - star.z / 100) * 4;
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(x, y, size, size);
                });
            },
            interactivedraw() {
                if (!testData.drawing) { ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height); }
                ctx.strokeStyle = `hsl(${Math.random() * 360}, 100%, 50%)`;
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(mouseX, mouseY);
                ctx.lineTo(mouseX + (Math.random() - 0.5) * 30, mouseY + (Math.random() - 0.5) * 30);
                ctx.stroke();
            },
            noisefield() {
                if (!testData.noiseTime) testData.noiseTime = 0;
                testData.noiseTime += 0.05;
                const imageData = ctx.createImageData(canvas.width, canvas.height);
                const data = imageData.data;
                for (let i = 0; i < canvas.width; i += 3) {
                    for (let j = 0; j < canvas.height; j += 3) {
                        const val = Math.abs(Math.sin(i * 0.005 + testData.noiseTime) * Math.sin(j * 0.005 + testData.noiseTime)) * 255;
                        const idx = (j * canvas.width + i) * 4;
                        data[idx] = val; data[idx + 1] = val * 0.7; data[idx + 2] = val * 0.4; data[idx + 3] = 255;
                    }
                }
                ctx.putImageData(imageData, 0, 0);
            },
            particleattractor() {
                if (!testData.attractors) {
                    testData.attractors = Array(500).fill().map(() => ({x: Math.random() * canvas.width, y: Math.random() * canvas.height, vx: 0, vy: 0}));
                }
                ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                testData.attractors.forEach(p => {
                    const dx = mouseX - p.x;
                    const dy = mouseY - p.y;
                    const dist = Math.sqrt(dx * dx + dy * dy) + 1;
                    p.vx += (dx / dist) * 0.5;
                    p.vy += (dy / dist) * 0.5;
                    p.vx *= 0.9;
                    p.vy *= 0.9;
                    p.x += p.vx;
                    p.y += p.vy;
                    ctx.fillStyle = '#0f0';
                    ctx.fillRect(p.x, p.y, 2, 2);
                });
                ctx.fillStyle = 'rgba(0, 255, 0, 0.1)';
                ctx.beginPath();
                ctx.arc(mouseX, mouseY, 100, 0, Math.PI * 2);
                ctx.fill();
            },
            cputest() {
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Heavy computation
                if (!testData.cpuLoad) testData.cpuLoad = 0;
                let result = 0;
                for (let i = 0; i < 10000000; i++) {
                    result += Math.sqrt(i) * Math.sin(i) * Math.cos(i);
                }
                testData.cpuLoad = Math.min(100, Math.floor((frameCount / 5) % 101));
                
                ctx.fillStyle = '#0ff';
                ctx.font = 'bold 60px monospace';
                ctx.fillText('CPU TEST', canvas.width / 2 - 180, 150);
                
                ctx.font = '40px monospace';
                ctx.fillStyle = '#f0f';
                ctx.fillText(`Load: ${testData.cpuLoad}%`, canvas.width / 2 - 120, 250);
                
                // Progress bar
                ctx.strokeStyle = '#0ff';
                ctx.lineWidth = 3;
                ctx.strokeRect(canvas.width / 2 - 200, 320, 400, 50);
                ctx.fillStyle = '#0ff';
                ctx.fillRect(canvas.width / 2 - 200, 320, 4 * testData.cpuLoad, 50);
                
                ctx.fillStyle = '#ff0';
                ctx.font = '28px monospace';
                ctx.fillText('Running heavy calculations...', canvas.width / 2 - 180, 450);
                ctx.fillText(`Status: ${testData.cpuLoad}%`, canvas.width / 2 - 120, 500);
            },
            ramtest() {
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                if (!testData.memBlocks) {
                    testData.memBlocks = [];
                    for (let i = 0; i < 50; i++) {
                        testData.memBlocks.push(new Float32Array(50000));
                    }
                    testData.memUsage = 0;
                }
                
                // Allocate and write to memory
                testData.memBlocks.forEach((block, idx) => {
                    const fillAmount = Math.min(1, (frameCount / 30) % 1);
                    for (let j = 0; j < Math.floor(block.length * fillAmount); j++) {
                        block[j] = Math.random();
                    }
                });
                testData.memUsage = Math.min(100, Math.floor((frameCount / 3) % 101));
                
                ctx.fillStyle = '#0ff';
                ctx.font = 'bold 60px monospace';
                ctx.fillText('RAM TEST', canvas.width / 2 - 160, 150);
                
                ctx.font = '40px monospace';
                ctx.fillStyle = '#f0f';
                const memMB = Math.round((testData.memUsage / 100) * 16);
                ctx.fillText(`Memory: ${memMB}/16 MB`, canvas.width / 2 - 150, 250);
                ctx.fillText(`Usage: ${testData.memUsage}%`, canvas.width / 2 - 120, 300);
                
                // Progress bar
                ctx.strokeStyle = '#0ff';
                ctx.lineWidth = 3;
                ctx.strokeRect(canvas.width / 2 - 200, 370, 400, 50);
                ctx.fillStyle = '#0ff';
                ctx.fillRect(canvas.width / 2 - 200, 370, 4 * testData.memUsage, 50);
                
                ctx.fillStyle = '#ff0';
                ctx.font = '28px monospace';
                ctx.fillText('Allocating memory blocks...', canvas.width / 2 - 180, 480);
                ctx.fillText(`Status: ${testData.memUsage}%`, canvas.width / 2 - 120, 530);
            },
            diskiotest() {
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                if (!testData.diskProgress) testData.diskProgress = 0;
                testData.diskProgress = Math.min(100, Math.floor((frameCount / 2) % 101));
                
                ctx.fillStyle = '#0ff';
                ctx.font = 'bold 60px monospace';
                ctx.fillText('DISK I/O TEST', canvas.width / 2 - 200, 150);
                
                ctx.font = '40px monospace';
                ctx.fillStyle = '#f0f';
                ctx.fillText(`Speed: ${Math.floor(Math.random() * 450) + 50} MB/s`, canvas.width / 2 - 200, 250);
                ctx.fillText(`Progress: ${testData.diskProgress}%`, canvas.width / 2 - 160, 300);
                
                // Progress bar
                ctx.strokeStyle = '#0ff';
                ctx.lineWidth = 3;
                ctx.strokeRect(canvas.width / 2 - 200, 370, 400, 50);
                ctx.fillStyle = '#0ff';
                ctx.fillRect(canvas.width / 2 - 200, 370, 4 * testData.diskProgress, 50);
                
                ctx.fillStyle = '#ff0';
                ctx.font = '28px monospace';
                ctx.fillText('Simulating disk read/write...', canvas.width / 2 - 190, 480);
                ctx.fillText(`Status: ${testData.diskProgress}%`, canvas.width / 2 - 130, 530);
            },
            systemmonitor() {
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                if (!testData.sysData) {
                    testData.sysData = { cpu: 0, ram: 0, gpu: 0, temp: 0 };
                }
                
                testData.sysData.cpu = Math.floor(Math.sin(frameCount * 0.02) * 20 + 45);
                testData.sysData.ram = Math.floor(Math.sin(frameCount * 0.015 + 1) * 15 + 62);
                testData.sysData.gpu = Math.floor(Math.sin(frameCount * 0.025 + 2) * 25 + 75);
                testData.sysData.temp = Math.floor(Math.sin(frameCount * 0.01 + 3) * 8 + 58);
                
                ctx.fillStyle = '#0ff';
                ctx.font = 'bold 60px monospace';
                ctx.fillText('SYSTEM MONITOR', canvas.width / 2 - 220, 120);
                
                ctx.font = '40px monospace';
                const startY = 220;
                const spacing = 70;
                
                ctx.fillStyle = '#f0f';
                ctx.fillText(`CPU  : ${testData.sysData.cpu}%`, 150, startY);
                ctx.fillText(`RAM  : ${testData.sysData.ram}%`, 150, startY + spacing);
                ctx.fillText(`GPU  : ${testData.sysData.gpu}%`, 150, startY + spacing * 2);
                ctx.fillText(`Temp : ${testData.sysData.temp}°C`, 150, startY + spacing * 3);
                
                // Draw progress bars
                const barY = startY + 15;
                const barWidth = 300;
                ctx.strokeStyle = '#0ff';
                ctx.lineWidth = 2;
                
                for (let i = 0; i < 4; i++) {
                    const y = barY + i * spacing;
                    ctx.strokeRect(500, y - 25, barWidth, 35);
                    ctx.fillStyle = '#0ff';
                    const values = [testData.sysData.cpu, testData.sysData.ram, testData.sysData.gpu, testData.sysData.temp / 100 * 100];
                    ctx.fillRect(500, y - 25, (barWidth * values[i]) / 100, 35);
                }
            }
        };
        
        function animate() {
            frameCount++;
            fpsCounter++;
            const now = performance.now();
            const deltaTime = now - lastTime;
            
            if (deltaTime >= 1000) {
                fps = Math.round((fpsCounter * 1000) / deltaTime);
                fpsDisplay.textContent = `FPS: ${fps}`;
                if (running) {
                    avgFpsArray.push(fps);
                    testDuration = (now - testStartTime) / 1000;
                }
                fpsCounter = 0;
                lastTime = now;
            }
            
            if (running && tests[currentTest]) {
                tests[currentTest]();
            } else if (!running) {
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            
            requestAnimationFrame(animate);
        }
        
        animate();
    </script>
</body>
